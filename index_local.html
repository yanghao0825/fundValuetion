<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金估值查询</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .search {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 12px 24px;
      background: #409eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .tips {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
    }

    .result {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed #eee;
    }

    .rise {
      color: red;
    }

    .fall {
      color: green;
    }

    #loading {
      display: none;
      text-align: center;
      padding: 10px;
    }

    #error {
      display: none;
      color: red;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>基金估值查询（GitHub可用）</h1>
    <div class="tips">数据来源：京东金融，上传GitHub可直接使用</div>

    <div class="search">
      <input id="code" placeholder="输入6位基金代码" maxlength="6">
      <button onclick="search()">查询</button>
    </div>

    <div id="loading">加载中...</div>
    <div id="error"></div>

    <div class="result" id="result"></div>
  </div>

  <script>


    // 调用 UniCloud 云对象
    const FUND_DOMAIN = "https://fc-mp-a29d40d4-0b3a-4132-9206-453100d7fe60.next.bspapp.com";
    async function search() {
      const code = document.getElementById("code").value.trim();
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");
      const result = document.getElementById("result");

      loading.style.display = "block";
      error.style.display = "none";
      result.style.display = "none";

      try {

        const requestUrl = `${FUND_DOMAIN}/fund/getFundData?fundCode=${code}`;
        const resp = await fetch(requestUrl, {
          method: "GET",
          headers: {
            "Content-Type": "application/json"
          }
        });

        if (!resp.ok) {
          throw new Error(`HTTP 请求失败：${resp.status}`);
        }

        const res = await resp.json();
        if (res.success && res.data) {
          // 渲染数据
          result.innerHTML = `
        <div class="item"><span>基金名称</span><span>${res.data.fundName}</span></div>
        <div class="item"><span>基金类型</span><span>${res.data.fundType}</span></div>
        <div class="item"><span>最新净值</span><span>${res.data.latestNav.toFixed(4)}</span></div>
        <div class="item"><span>昨日涨跌幅</span><span class="${res.data.dailyRate >= 0 ? 'rise' : 'fall'}">${res.data.dailyRate >= 0 ? '+' + res.data.dailyRate : res.data.dailyRate}%</span></div>
        <div class="item"><span>实时估值涨幅</span><span class="${res.data.realtimeValuationRate >= 0 ? 'rise' : 'fall'}">${res.data.realtimeValuationRate >= 0 ? '+' + res.data.realtimeValuationRate : res.data.realtimeValuationRate}%</span></div>
        <div class="item"><span>实时估算净值</span><span>${res.data.realtimeValuationNav}</span></div>
      `;
          result.style.display = "block";
          if (res.data.stockList && res.data.stockList.length > 0) {
            let stockHtml = '<div class="item"><span style="font-weight:bold">重仓股明细</span><span></span></div>';
            res.data.stockList.forEach(stock => {
              stockHtml += `
      <div class="item">
        <span>${stock.stockName}(${stock.stockCode})[${stock.industryName}]</span>
        <span class="${stock.rate >= 0 ? 'rise' : 'fall'}">
          ${stock.rate >= 0 ? '+' + stock.rate : stock.rate}% 
          (权重${stock.weight}%)
        </span>
      </div>
    `;
            });
            result.innerHTML += stockHtml;
          }
        } else {
          throw new Error(res.msg);
        }
      } catch (e) {
        error.innerText = "查询失败：" + e.message;
        error.style.display = "block";
      } finally {
        loading.style.display = "none";
      }
    }
  </script>
</body>

</html>
