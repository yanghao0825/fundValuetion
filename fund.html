<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <!-- 核心适配：移动端视口配置 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>基金估值查询</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
    }

    body {
      background: #f5f7fa;
      padding: 10px;
      /* 移动端减少内边距 */
      font-size: 14px;
      /* 基础字号适配 */
    }

    .container {
      width: 100%;
      max-width: 1200px;
      /* 移动端宽度100% */
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 20px 15px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 18px;
      /* 移动端标题字号减小 */
      font-weight: 600;
      color: #333;
    }

    .tips {
      font-size: 12px;
      color: #999;
      margin-bottom: 15px;
      text-align: center;
      display: block;
      line-height: 1.4;
    }

    .search {
      display: flex;
      gap: 8px;
      /* 移动端减小间距 */
      margin-bottom: 20px;
      width: 100%;
    }

    input {
      flex: 1;
      padding: 12px 15px;
      /* 增大点击区域 */
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      /* 去掉默认高亮 */
    }

    input:focus {
      border-color: #409eff;
      /* 聚焦态提示 */
    }

    button {
      padding: 12px 18px;
      /* 移动端按钮内边距适配 */
      background: #409eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 15px;
      white-space: nowrap;
      /* 防止按钮文字换行 */
    }

    button:hover {
      background: #66b1ff;
    }

    /* 历史记录样式 - 移动端适配 */
    .history-box {
      margin: 15px 0;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .history-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .clear-btn {
      padding: 4px 8px;
      /* 移动端清空按钮缩小 */
      font-size: 12px;
      background: #f56c6c;
      color: #fff;
      border: none;
      border-radius: 4px;
    }

    .clear-btn:hover {
      background: #f78989;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      /* 移动端减小列表间距 */
    }

    .history-item {
      display: flex;
      align-items: center;
      padding: 10px 8px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #eee;
      width: 100%;
    }

    .history-content {
      flex: 1;
      /* display: flex;
      align-items: center; */
      cursor: pointer;
      min-width: 0;
      /* 关键：解决文字溢出问题 */
    }

    .history-content:hover {
      opacity: 0.8;
    }

    .history-code {
      font-size: 14px;
      font-weight: 600;
      color: #409eff;
      width: 70px;
      /* 移动端减小代码宽度 */
      flex-shrink: 0;
      /* 防止被压缩 */
    }

    .history-name {
      flex: 1;
      font-size: 13px;
      color: #333;
      margin: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    .history-time {
      font-size: 11px;
      color: #999;
      width: 120px;
      /* 移动端减小时间宽度 */
      text-align: right;
      flex-shrink: 0;
      /* 防止被压缩 */
    }

    /* 单条删除按钮 - 移动端适配 */
    .delete-btn {
      width: 20px;
      height: 20px;
      line-height: 20px;
      text-align: center;
      border-radius: 25px;
      /* 移动端缩小删除按钮 */
      font-size: 14px;
      background: #ff4757;
      color: #fff;
      border: none;
      margin-left: 8px;
      /* 移动端减小最小宽度 */
      flex-shrink: 0;
      /* 防止被压缩 */
      margin: 0;
      padding: 0;
    }

    .delete-btn:hover {
      background: #ff6b81;
    }

    #loading {
      display: none;
      text-align: center;
      padding: 10px;
      color: #666;
      font-size: 14px;
    }

    #error {
      display: none;
      color: red;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      line-height: 1.4;
    }

    .result {
      background: #f8f9fa;
      padding: 15px 12px;
      /* 移动端减小内边距 */
      border-radius: 8px;
      margin-top: 10px;
      display: none;
      width: 100%;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed #eee;
      align-items: center;
      /* 垂直居中，防止文字错位 */
    }

    .item:last-child {
      border-bottom: none;
      /* 最后一项去掉下划线 */
    }

    .rise {
      color: #f56c6c;
      /* 移动端更柔和的红色 */
    }

    .fall {
      color: #67c23a;
      /* 移动端更柔和的绿色 */
    }

    /* Toast 提示样式 - 移动端优化 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      z-index: 9999;
      display: none;
      min-width: 120px;
      text-align: center;
    }

    /* 适配小屏手机（320px以下） */
    @media screen and (max-width: 320px) {
      .history-time {
        width: 100px;
        /* 超小屏再缩小时间宽度 */
      }

      .history-code {
        width: 60px;
        /* 超小屏缩小代码宽度 */
      }

      button {
        padding: 12px 12px;
        /* 超小屏按钮进一步缩小 */
      }
    }

    /* 禁止用户缩放 */
    * {
      touch-action: manipulation;
      /* 优化移动端点击 */
    }

    .acea-row {
      display: -webkit-box;
      display: -moz-box;
      display: -webkit-flex;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-lines: multiple;
      -moz-box-lines: multiple;
      -o-box-lines: multiple;
      -webkit-flex-wrap: wrap;
      -ms-flex-wrap: wrap;
      flex-wrap: wrap;
      /* 辅助类 */
    }

    .acea-row.row-middle {
      -webkit-box-align: center;
      -moz-box-align: center;
      -o-box-align: center;
      -ms-flex-align: center;
      -webkit-align-items: center;
      align-items: center;
    }

    .acea-row.row-top {
      -webkit-box-align: start;
      -moz-box-align: start;
      -o-box-align: start;
      -ms-flex-align: start;
      -webkit-align-items: flex-start;
      align-items: flex-start;
    }

    .acea-row.row-bottom {
      -webkit-box-align: end;
      -moz-box-align: end;
      -o-box-align: end;
      -ms-flex-align: end;
      -webkit-align-items: flex-end;
      align-items: flex-end;
    }

    .acea-row.row-center {
      -webkit-box-pack: center;
      -moz-box-pack: center;
      -o-box-pack: center;
      -ms-flex-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
    }

    .acea-row.row-right {
      -webkit-box-pack: end;
      -moz-box-pack: end;
      -o-box-pack: end;
      -ms-flex-pack: end;
      -webkit-justify-content: flex-end;
      justify-content: flex-end;
    }

    .acea-row.row-left {
      -webkit-box-pack: start;
      -moz-box-pack: start;
      -o-box-pack: start;
      -ms-flex-pack: start;
      -webkit-justify-content: flex-start;
      justify-content: flex-start;
    }

    .acea-row.row-between {
      -webkit-box-pack: justify;
      -moz-box-pack: justify;
      -o-box-pack: justify;
      -ms-flex-pack: justify;
      -webkit-justify-content: space-between;
      justify-content: space-between;
    }

    .acea-row.row-around {
      justify-content: space-around;
      -webkit-justify-content: space-around;
    }

    .acea-row.row-column-around {
      -webkit-flex-direction: column;
      -ms-flex-direction: column;
      flex-direction: column;
      justify-content: space-around;
      -webkit-justify-content: space-around;
    }

    .acea-row.row-column {
      -webkit-box-orient: vertical;
      -moz-box-orient: vertical;
      -o-box-orient: vertical;
      -webkit-flex-direction: column;
      -ms-flex-direction: column;
      flex-direction: column;
    }

    .acea-row.row-column-between {
      -webkit-box-orient: vertical;
      -moz-box-orient: vertical;
      -o-box-orient: vertical;
      -webkit-flex-direction: column;
      -ms-flex-direction: column;
      flex-direction: column;
      -webkit-box-pack: justify;
      -moz-box-pack: justify;
      -o-box-pack: justify;
      -ms-flex-pack: justify;
      -webkit-justify-content: space-between;
      justify-content: space-between;
    }

    /* 上下左右垂直居中 */
    .acea-row.row-center-wrapper {
      -webkit-box-align: center;
      -moz-box-align: center;
      -o-box-align: center;
      -ms-flex-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -moz-box-pack: center;
      -o-box-pack: center;
      -ms-flex-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
    }

    /* 上下两边居中对齐 */
    .acea-row.row-between-wrapper {
      -webkit-box-align: center;
      -moz-box-align: center;
      -o-box-align: center;
      -ms-flex-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: justify;
      -moz-box-pack: justify;
      -o-box-pack: justify;
      -ms-flex-pack: justify;
      -webkit-justify-content: space-between;
      justify-content: space-between;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>基金估值查询</h1>
    <span class="tips">数据来源：京东金融 | 输入6位基金代码查询</span>

    <div class="search">
      <input id="code" placeholder="输入6位基金代码" maxlength="6" inputmode="numeric">
      <button onclick="search()">查询</button>
    </div>

    <!-- 历史记录区域 -->
    <div class="history-box" id="historyBox" style="display: none;">
      <div class="history-header">
        <span class="history-title">搜索历史</span>
        <button class="clear-btn" onclick="clearHistory()">清空全部</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div id="loading">加载中...</div>
    <div id="error"></div>
    <div class="result" id="result"></div>

    <!-- Toast 提示框 -->
    <div class="toast" id="toast"></div>
  </div>

  <script>
    // 常量定义
    const FUND_DOMAIN = "https://fc-mp-a29d40d4-0b3a-4132-9206-453100d7fe60.next.bspapp.com";
    // 历史记录列表
    let historyList = [];

    // 页面加载时读取本地历史记录
    window.onload = function () {
      const history = localStorage.getItem('fundSearchHistory');
      if (history) {
        historyList = JSON.parse(history);
        renderHistoryList();
      }
      // 移动端优化：输入框聚焦时自动弹出数字键盘
      document.getElementById('code').addEventListener('focus', function () {
        this.setAttribute('type', 'tel'); // 强制数字键盘
      });
    };

    // 渲染历史记录列表
    function renderHistoryList() {
      const historyBox = document.getElementById('historyBox');
      const historyListEl = document.getElementById('historyList');

      // 无历史记录时隐藏区域
      if (historyList.length === 0) {
        historyBox.style.display = 'none';
        return;
      }

      historyBox.style.display = 'block';
      historyListEl.innerHTML = '';

      // 遍历渲染每条历史
      historyList.forEach((item, index) => {
        const historyItem = document.createElement('div');
        historyItem.className = 'history-item';

        // 历史内容（点击重查）
        const historyContent = document.createElement('div');
        historyContent.className = 'history-content';
        historyContent.onclick = () => searchHistory(item.fundCode);
        historyContent.innerHTML = `
          <div class="acea-row row-between row-center">
            <span class="history-code">${item.fundCode}</span>
           <span class="history-name">${item.fundName}</span>
          </div>
          
        `;

        // 删除按钮
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.innerText = '×';
        // 阻止事件冒泡（避免点击删除触发重查）
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          deleteHistory(index);
        };

        historyItem.appendChild(historyContent);
        historyItem.appendChild(deleteBtn);
        historyListEl.appendChild(historyItem);
      });
    }

    // 保存历史记录到本地
    function saveHistory(fundCode, fundName) {
      const historyItem = {
        fundCode,
        fundName,
        searchTime: new Date().toLocaleString()
      };

      // 去重：删除旧记录
      historyList = historyList.filter(item => item.fundCode !== fundCode);
      // 新增记录置顶
      historyList.unshift(historyItem);
      // 限制最多10条
      if (historyList.length > 10) {
        historyList = historyList.slice(0, 10);
      }
      // 保存到localStorage
      localStorage.setItem('fundSearchHistory', JSON.stringify(historyList));
      // 重新渲染列表
      renderHistoryList();
    }

    // 清空所有历史记录
    function clearHistory() {
      if (confirm('确定要清空所有搜索历史吗？')) {
        historyList = [];
        localStorage.removeItem('fundSearchHistory');
        renderHistoryList();
        showToast('已清空');
      }
    }

    // 删除单条历史记录
    function deleteHistory(index) {
      if (confirm('确定要删除这条历史记录吗？')) {
        historyList.splice(index, 1);
        localStorage.setItem('fundSearchHistory', JSON.stringify(historyList));
        renderHistoryList();
        showToast('已删除');
      }
    }

    // 点击历史记录重新查询
    function searchHistory(code) {
      document.getElementById('code').value = code;
      search();
    }

    // 显示Toast提示
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 1500);
    }

    // 核心查询方法
    async function search() {
      const code = document.getElementById('code').value.trim();
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const result = document.getElementById('result');

      // 清空旧数据
      loading.style.display = "block";
      error.style.display = "none";
      result.style.display = "none";

      // 参数校验
      if (!code || code.length !== 6 || isNaN(code)) {
        loading.style.display = 'none';
        error.innerText = '请输入6位有效数字基金代码';
        error.style.display = 'block';
        return;
      }

      try {
        const requestUrl = `${FUND_DOMAIN}/fund/getFundData?fundCode=${code}`;
        const resp = await fetch(requestUrl, {
          method: "GET",
          headers: {
            "Content-Type": "application/json"
          }
        });

        if (!resp.ok) {
          throw new Error(`HTTP 请求失败：${resp.status}`);
        }

        const res = await resp.json();
        if (res.success && res.data) {
          // 渲染查询结果
          result.innerHTML = `
            <div class="item"><span>基金名称</span><span>${res.data.fundName}</span></div>
            <div class="item"><span>基金类型</span><span>${res.data.fundType}</span></div>
            <div class="item"><span>最新净值</span><span>${parseFloat(res.data.latestNav).toFixed(4)}</span></div>
            <div class="item"><span>昨日涨跌幅</span><span class="${res.data.dailyRate >= 0 ? 'rise' : 'fall'}">${res.data.dailyRate >= 0 ? '+' + res.data.dailyRate : res.data.dailyRate}%</span></div>
            <div class="item"><span>实时估值涨幅</span><span class="${res.data.realtimeValuationRate >= 0 ? 'rise' : 'fall'}">${res.data.realtimeValuationRate >= 0 ? '+' + res.data.realtimeValuationRate : res.data.realtimeValuationRate}%</span></div>
            <div class="item"><span>实时估算净值</span><span>${res.data.realtimeValuationNav}</span></div>
          `;

          // 渲染重仓股明细
          if (res.data.stockList && res.data.stockList.length > 0) {
            let stockHtml = '<div class="item"><span style="font-weight:bold">重仓股明细</span><span></span></div>';
            res.data.stockList.forEach(stock => {
              stockHtml += `
                <div class="item">
                  <span style="font-size:13px;">${stock.stockName}(${stock.stockCode})[${stock.industryName}]</span>
                  <span class="${stock.rate >= 0 ? 'rise' : 'fall'}" style="font-size:13px;">
                    ${stock.rate >= 0 ? '+' + stock.rate : stock.rate}% 
                    (权重${stock.weight}%)
                  </span>
                </div>
              `;
            });
            result.innerHTML += stockHtml;
          }

          result.style.display = "block";
          // 保存历史记录
          saveHistory(code, res.data.fundName);
        } else {
          throw new Error(res.error?.message || '查询失败，暂无数据');
        }
      } catch (e) {
        error.innerText = "查询失败：" + e.message;
        error.style.display = "block";
      } finally {
        loading.style.display = "none";
      }
    }

    // 移动端优化：点击空白处收起键盘
    document.addEventListener('click', function (e) {
      if (e.target.tagName !== 'INPUT') {
        document.activeElement.blur();
      }
    });
  </script>
</body>

</html>
